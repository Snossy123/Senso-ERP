function saveCart() { localStorage.setItem('nexus_cart', JSON.stringify(state.cart)); }
function saveWishlist() { localStorage.setItem('nexus_wishlist', JSON.stringify(state.wishlist)); }
function saveUser() { localStorage.setItem('nexus_user', JSON.stringify(state.user)); }

function cartCount() { return state.cart.reduce((s,i) => s + i.quantity, 0); }
function cartSubtotal() { return state.cart.reduce((s,i) => s + i.price * i.quantity, 0); }
function cartDiscount() {
  if (!state.coupon) return 0;
  const sub = cartSubtotal();
  if (sub < state.coupon.minOrder) return 0;
  return state.coupon.type === 'percent' ? Math.round(sub * state.coupon.value / 100 * 100) / 100 : state.coupon.value;
}
function cartTotal() { return Math.max(0, cartSubtotal() - cartDiscount()); }
function freeShippingThreshold() { return 100; }
function shippingCost() { return cartSubtotal() >= freeShippingThreshold() ? 0 : 9.95; }

function addToCart(variantId, quantity = 1) {
  const existing = state.cart.find(i => i.variantId === variantId);
  if (existing) { existing.quantity += quantity; }
  else {
    let variant = null, product = null;
    PRODUCTS.forEach(p => { p.variants.forEach(v => { if (v.id === variantId) { variant = v; product = p; } }); });

  }
  saveCart(); renderCartBadge(); showToast('Added to cart','success');
}
function removeFromCart(variantId) {
  state.cart = state.cart.filter(i => i.variantId !== variantId);

  saveCart(); renderCartBadge(); renderCartDrawer();
}

  const item = state.cart.find(i => i.variantId === variantId);
  if (!item) return;
  if (qty <= 0) { removeFromCart(variantId); return; }
  item.quantity = qty;
  saveCart(); renderCartBadge(); renderCartDrawer();
}
function toggleWishlist(productId) {
  const idx = state.wishlist.indexOf(productId);
  if (idx > -1) { state.wishlist.splice(idx,1); showToast('Removed from wishlist','info'); }
  else { state.wishlist.push(productId); showToast('Added to wishlist','success'); }
  saveWishlist();
}
function isWished(productId) { return state.wishlist.includes(productId); }

// =====================================================
// TOAST SYSTEM
// =====================================================
function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = { success:'fa-check-circle', error:'fa-exclamation-circle', info:'fa-info-circle' };
  t.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3500);
}

// =====================================================

// =====================================================
function navigate(page, param = null) {
  const app = document.getElementById('app');
  app.classList.add('transitioning');
  setTimeout(() => {
    state.currentPage = page;
    state.pageParam = param;
    window.scrollTo({ top: 0, behavior: 'instant' });
    renderPage();
    app.classList.remove('transitioning');
    setTimeout(() => initPageAnimations(), 50);
  }, 150);
}

function renderPage() {
  const main = document.getElementById('mainContent');
  switch(state.currentPage) {
    case 'home': main.innerHTML = renderHomepage(); break;
    case 'products': main.innerHTML = renderProductList(); break;
    case 'product': main.innerHTML = renderProductDetail(); break;
    case 'checkout': main.innerHTML = renderCheckout(); break;
    case 'account': main.innerHTML = renderAccount(); break;
    case 'order-confirmation': main.innerHTML = renderOrderConfirmation(); break;
    default: main.innerHTML = renderHomepage();
  }
  renderHeader(); renderFooter(); renderBottomNav();
}

function applyCoupon(e) {
  e.preventDefault();
  const code = document.getElementById('couponInput').value.trim().toUpperCase();
  const coupon = COUPONS.find(c => c.code === code);
  if (!coupon) { showToast('Invalid coupon code','error'); return; }
  if (cartSubtotal() < coupon.minOrder) { showToast(`Minimum order of $${coupon.minOrder} required`,'error'); return; }
  state.coupon = coupon;
  showToast(`Coupon ${code} applied!`,'success');
  renderCartDrawer();
}

  const el = document.getElementById('searchResults');
  if (!query.trim()) { el.innerHTML = '<div class="p-8 text-center text-gray-400 text-sm">Start typing to search...</div>'; return; }
  const q = query.toLowerCase();
  const results = PRODUCTS.filter(p => p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || p.tags.some(t => t.includes(q)) || p.vendor.toLowerCase().includes(q));
  if (results.length === 0) {
    el.innerHTML = `<div class="p-8 text-center"><div class="w-16 h-16 bg-surface-50 rounded-full flex items-center justify-center mx-auto mb-3"><i class="fas fa-search text-xl text-gray-300"></i></div><p class="font-display font-semibold text-gray-600 mb-1">No results found</p><p class="text-sm text-gray-400">Try searching for "jacket" or "denim"</p></div>`;
    return;
  }
  el.innerHTML = results.map(p => `
    <a onclick="toggleSearch(false);navigate('product','${p.slug}')" class="flex items-center gap-4 p-4 hover:bg-surface-50 cursor-pointer transition-colors border-b border-surface-50 last:border-0">

            const col = COLORS.find(x=>x.name===c);
            return `<span class="w-4 h-4 rounded-full border border-surface-200" style="background:${col?col.hex:'#999'}"></span>`;

function quickAdd(productId) {
  const p = PRODUCTS.find(x => x.id === productId);
  if (!p) return;
  // Add first available variant
  const v = p.variants.find(v => v.stock > 0) || p.variants[0];
  if (v) addToCart(v.id);
  toggleCart(true);
}

function renderProductList() {
  const f = state.filters;
  let products = [...PRODUCTS];
  // Filter
  if (f.category) products = products.filter(p => p.category === f.category);
  if (f.colors.length) products = products.filter(p => p.colors.some(c => f.colors.includes(c)));
  if (f.sizes.length) products = products.filter(p => p.sizes.some(s => f.sizes.includes(s)));
  if (f.inStock) products = products.filter(p => p.variants.some(v => v.stock > 0));
  // Sort
  switch(f.sort) {
    case 'price-asc': products.sort((a,b) => a.basePrice - b.basePrice); break;
    case 'price-desc': products.sort((a,b) => b.basePrice - a.basePrice); break;
    case 'newest': break; // default order
  }
  const catName = f.category ? CATEGORIES.find(c=>c.id===f.category)?.name : 'All Products';
  const activeFilterCount = (f.category?1:0) + f.colors.length + f.sizes.length + (f.inStock?1:0);

  return `
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
      <!-- Breadcrumb -->
      <nav class="flex items-center gap-2 text-sm text-gray-400 mb-6" aria-label="Breadcrumb">

        <div>
          <h1 class="font-display font-bold text-2xl sm:text-3xl">${catName}</h1>
          <p class="text-sm text-gray-400 mt-1">${products.length} product${products.length!==1?'s':''}</p>

// PDP state
let pdpSelectedColor = null;
let pdpSelectedSize = null;

function selectPdpColor(color, btn) {
  pdpSelectedColor = color;
  document.getElementById('selectedColorLabel').textContent = color;
  document.querySelectorAll('#pdpColors .swatch').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  updatePdpStock();
}
function selectPdpSize(size, btn) {
  pdpSelectedSize = size;
  document.getElementById('selectedSizeLabel').textContent = size;
  document.querySelectorAll('#pdpSizes .size-pill').forEach(s => s.classList.remove('active'));
  btn.classList.add('active');
  updatePdpStock();
}
function updatePdpStock() {
  const p = PRODUCTS.find(x => x.slug === state.pageParam);
  if (!p) return;
  const v = p.variants.find(v => v.color === (pdpSelectedColor || p.colors[0]) && v.size === (pdpSelectedSize || p.sizes[0] || null));
  const el = document.getElementById('stockStatus');
  if (!v || v.stock === 0) { el.innerHTML = '<p class="text-sm text-red-500 font-medium">Out of stock</p>'; return; }
  if (v.lowStock) { el.innerHTML = '<p class="text-sm text-warm-500 font-medium"><i class="fas fa-exclamation-triangle mr-1"></i>Only a few left</p>'; return; }
  el.innerHTML = '<p class="text-sm text-brand-600 font-medium"><i class="fas fa-check-circle mr-1"></i>In stock</p>';
}
function addPdpToCart(productId) {
  const p = PRODUCTS.find(x => x.id === productId);
  if (!p) return;
  const color = pdpSelectedColor || p.colors[0];
  const size = pdpSelectedSize || (p.sizes[0] || null);
  const variantId = `${p.id}-${color}${size?'-'+size:''}`;
  const variant = p.variants.find(v => v.id === variantId);
  if (variant && variant.stock === 0) { showToast('This variant is out of stock','error'); return; }
  addToCart(variantId);
  toggleCart(true);
  pdpSelectedColor = null; pdpSelectedSize = null;
}

        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
          <div><label class="text-sm font-medium text-gray-700 mb-1 block">City</label><input type="text" id="chkCity" value="${d.city}" required class="w-full px-4 py-3 text-sm border border-surface-200 rounded-xl focus:outline-none focus:border-brand-500 bg-surface-0"></div>
          <div><label class="text-sm font-medium text-gray-700 mb-1 block">Postal code</label><input type="text" id="chkPostcode" value="${d.postcode}" required class="w-full px-4 py-3 text-sm border border-surface-200 rounded-xl focus:outline-none focus:border-brand-500 bg-surface-0"></div>
          <div class="col-span-2 sm:col-span-1"><label class="text-sm font-medium text-gray-700 mb-1 block">Country</label><select id="chkCountry" class="w-full px-4 py-3 text-sm border border-surface-200 rounded-xl focus:outline-none focus:border-brand-500 bg-surface-0"><option value="US" ${d.country==='US'?'selected':''}>United States</option><option value="GB" ${d.country==='GB'?'selected':''}>United Kingdom</option><option value="CA" ${d.country==='CA'?'selected':''}>Canada</option><option value="AU" ${d.country==='AU'?'selected':''}>Australia</option></select></div>
        </div>
      </div>
      <div class="flex items-center justify-between mt-8">
        <button onclick="navigate('products')" class="text-sm text-gray-500 hover:text-gray-700 font-medium"><i class="fas fa-arrow-left mr-1 text-xs"></i> Back to cart</button>
        <button onclick="goCheckoutStep2()" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-display font-semibold text-sm hover:bg-gray-800 transition-colors">Continue to Shipping</button>
      </div>
    </div>
  `;
}
function goCheckoutStep2() {
  const fields = ['chkEmail','chkFirst','chkLast','chkAddr1','chkCity','chkPostcode'];
  let valid = true;
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) { el.style.borderColor = '#DC2626'; valid = false; }
    else { el.style.borderColor = ''; }
  });
  if (!valid) { showToast('Please fill in all required fields','error'); return; }
  state.checkoutData = {
    email: document.getElementById('chkEmail').value,
    firstName: document.getElementById('chkFirst').value,
    lastName: document.getElementById('chkLast').value,
    address1: document.getElementById('chkAddr1').value,
    address2: document.getElementById('chkAddr2').value,
    city: document.getElementById('chkCity').value,
    postcode: document.getElementById('chkPostcode').value,
    country: document.getElementById('chkCountry').value,
    shippingMethod: state.checkoutData.shippingMethod
  };
  state.checkoutStep = 2;
  renderPage();
}
function renderCheckoutStep2() {
  const methods = [
    { id:'standard', name:'Standard Shipping', desc:'3-5 business days', price: shippingCost() === 0 ? 'Free' : '$9.95' },
    { id:'express', name:'Express Shipping', desc:'1-2 business days', price:'$14.95' },
  ];
  return `
    <div class="bg-white rounded-2xl p-6 sm:p-8 border border-surface-100">
      <h2 class="font-display font-semibold text-xl mb-6">Shipping Method</h2>
      <div class="space-y-3 mb-8">
        ${methods.map(m => `
          <label class="flex items-center justify-between p-4 rounded-xl border ${state.checkoutData.shippingMethod===m.id?'border-brand-500 bg-brand-50':'border-surface-200 hover:border-gray-300'} cursor-pointer transition-colors">
            <div class="flex items-center gap-3">
              <input type="radio" name="ship" value="${m.id}" ${state.checkoutData.shippingMethod===m.id?'checked':''} onchange="state.checkoutData.shippingMethod='${m.id}';renderPage()" class="text-brand-500 focus:ring-brand-500">
              <div>
                <p class="font-medium text-sm">${m.name}</p>
                <p class="text-xs text-gray-400">${m.desc}</p>
              </div>
            </div>
            <span class="font-semibold text-sm ${m.price==='Free'?'text-brand-600':''}">${m.price}</span>
          </label>
        `).join('')}
      </div>
      <div class="flex items-center justify-between">
        <button onclick="state.checkoutStep=1;renderPage()" class="text-sm text-gray-500 hover:text-gray-700 font-medium"><i class="fas fa-arrow-left mr-1 text-xs"></i> Back</button>
        <button onclick="if(!state.checkoutData.shippingMethod){showToast('Please select a shipping method','error');return;}state.checkoutStep=3;renderPage()" class="bg-gray-900 text-white px-8 py-3 rounded-xl font-display font-semibold text-sm hover:bg-gray-800 transition-colors">Continue to Payment</button>
      </div>
    </div>
  `;
}
function renderCheckoutStep3() {
  return `
    <div class="bg-white rounded-2xl p-6 sm:p-8 border border-surface-100">
      <h2 class="font-display font-semibold text-xl mb-6">Payment</h2>
      <!-- Card form (simulated) -->
      <div class="space-y-4 mb-6">
        <div>
          <label class="text-sm font-medium text-gray-700 mb-1 block">Card number</label>
          <div class="relative">
            <input type="text" id="cardNumber" maxlength="19" class="w-full px-4 py-3 text-sm border border-surface-200 rounded-xl focus:outline-none focus:border-brand-500 bg-surface-0 pr-12" placeholder="4242 4242 4242 4242" oninput="formatCardNumber(this)">
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-1">
              <i class="fab fa-cc-visa text-blue-600 text-lg"></i>
              <i class="fab fa-cc-mastercard text-orange-500 text-lg"></i>
            </div>
          </div>
        </div>
        <div class="text-xs text-gray-400 flex items-center gap-1"><i class="fas fa-lock"></i> Your card info is encrypted and secure (Stripe)</div>
        <div class="grid grid-cols-2 gap-4">
          <div><label class="text-sm font-medium text-gray-700 mb-1 block">Expiry</label><input type="text" maxlength="5" class="w-full px-4 py-3 text-sm border border-surface-200 rounded-xl focus:outline-none focus:border-brand-500 bg-surface-0" placeholder="MM/YY" oninput="formatExpiry(this)"></div>
          <div><label class="text-sm font-medium text-gray-700 mb-1 block">CVC</label><input type="text" maxlength="4" class="w-full px-4 py-3 text-sm border border-surface-200 rounded-xl focus:outline-none focus:border-brand-500 bg-surface-0" placeholder="123"></div>
        </div>
        <div><label class="text-sm font-medium text-gray-700 mb-1 block">Name on card</label><input type="text" class="w-full px-4 py-3 text-sm border border-surface-200 rounded-xl focus:outline-none focus:border-brand-500 bg-surface-0" value="${state.checkoutData.firstName} ${state.checkoutData.lastName}"></div>
      </div>
      <!-- Other methods -->
      <div class="border-t border-surface-100 pt-4 space-y-3 mb-8">
        <label class="flex items-center gap-3 p-3 rounded-xl border border-surface-200 cursor-pointer hover:border-gray-300 transition-colors">
          <input type="radio" name="paymethod" value="paypal" class="text-brand-500 focus:ring-brand-500">
          <i class="fab fa-paypal text-blue-600 text-lg"></i>
          <span class="text-sm font-medium">PayPal</span>
        </label>
        <label class="flex items-center gap-3 p-3 rounded-xl border border-surface-200 cursor-pointer hover:border-gray-300 transition-colors">
          <input type="radio" name="paymethod" value="cod" class="text-brand-500 focus:ring-brand-500">
          <i class="fas fa-money-bill-wave text-green-600"></i>
          <span class="text-sm font-medium">Cash on Delivery</span>
        </label>
      </div>
      <div class="flex items-center justify-between">
        <button onclick="state.checkoutStep=2;renderPage()" class="text-sm text-gray-500 hover:text-gray-700 font-medium"><i class="fas fa-arrow-left mr-1 text-xs"></i> Back</button>
        <button onclick="placeOrder()" id="placeOrderBtn" class="bg-brand-500 hover:bg-brand-600 text-white px-8 py-3.5 rounded-xl font-display font-semibold text-sm transition-colors flex items-center gap-2">
          <i class="fas fa-lock text-xs"></i> Place Order
        </button>
      </div>
    </div>
  `;
}
function formatCardNumber(el) { let v = el.value.replace(/\D/g,'').slice(0,16); el.value = v.replace(/(.{4})/g,'$1 ').trim(); }
function formatExpiry(el) { let v = el.value.replace(/\D/g,'').slice(0,4); if (v.length >= 2) v = v.slice(0,2) + '/' + v.slice(2); el.value = v; }

function placeOrder() {
  const btn = document.getElementById('placeOrderBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  btn.disabled = true;
  setTimeout(() => {
    state.cart = [];
    state.coupon = null;
    saveCart();
    state.checkoutStep = 1;
    state.checkoutData = { email:'', firstName:'', lastName:'', address1:'', address2:'', city:'', postcode:'', country:'US', shippingMethod:null };
    navigate('order-confirmation');
  }, 1800);
}

// =====================================================
// ACCOUNT PAGE
// =====================================================
function renderAccount() {
  if (!state.user) { toggleAuth(true); return '<div class="max-w-7xl mx-auto px-6 py-20 text-center"><p class="text-gray-400">Please sign in to view your account.</p></div>'; }
  const orders = [
    { number:'NX-2026-08421', date:'Apr 22, 2026', status:'delivered', total:'$312.00', items:2 },
    { number:'NX-2026-08195', date:'Apr 15, 2026', status:'shipped', total:'$189.00', items:1 },
    { number:'NX-2026-07803', date:'Apr 3, 2026', status:'delivered', total:'$425.00', items:3 },
  ];
  const statusColors = { pending:'bg-yellow-100 text-yellow-700', processing:'bg-blue-100 text-blue-700', shipped:'bg-indigo-100 text-indigo-700', delivered:'bg-green-100 text-green-700', cancelled:'bg-red-100 text-red-700' };
  return `
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
      <nav class="flex items-center gap-2 text-sm text-gray-400 mb-8" aria-label="Breadcrumb">
        <a onclick="navigate('home')" class="hover:text-gray-600 cursor-pointer">Home</a>
        <i class="fas fa-chevron-right text-[10px]"></i>
        <span class="text-gray-700 font-medium">Account</span>
      </nav>
      <div class="grid md:grid-cols-4 gap-8">
        <!-- Sidebar -->
        <aside class="md:col-span-1">
          <div class="bg-white rounded-2xl p-6 border border-surface-100 text-center">
            <img src="${state.user.avatar}" alt="${state.user.name}" class="w-20 h-20 rounded-full mx-auto mb-3 object-cover">
            <p class="font-display font-semibold">${state.user.name}</p>
            <p class="text-sm text-gray-400">${state.user.email}</p>
            <hr class="my-4 border-surface-100">
            <nav class="space-y-1 text-left">
              <a class="flex items-center gap-2 px-3 py-2 text-sm font-medium rounded-lg bg-surface-50 text-gray-900"><i class="fas fa-box w-4 text-center text-gray-400"></i>Orders</a>
              <a class="flex items-center gap-2 px-3 py-2 text-sm text-gray-500 rounded-lg hover:bg-surface-50 cursor-pointer"><i class="fas fa-heart w-4 text-center text-gray-400"></i>Wishlist <span class="ml-auto text-xs text-gray-400">${state.wishlist.length}</span></a>
              <a class="flex items-center gap-2 px-3 py-2 text-sm text-gray-500 rounded-lg hover:bg-surface-50 cursor-pointer"><i class="fas fa-map-marker-alt w-4 text-center text-gray-400"></i>Addresses</a>
              <a class="flex items-center gap-2 px-3 py-2 text-sm text-gray-500 rounded-lg hover:bg-surface-50 cursor-pointer"><i class="fas fa-cog w-4 text-center text-gray-400"></i>Settings</a>

        <div class="md:col-span-3">
          <h2 class="font-display font-bold text-2xl mb-6">Recent Orders</h2>

            <div class="space-y-4">
              ${orders.map(o => `
                <div class="bg-white rounded-2xl p-5 sm:p-6 border border-surface-100 hover:shadow-md transition-shadow">
                  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                    <div>
                      <p class="font-display font-semibold">${o.number}</p>

                    <div class="flex items-center gap-3">
                      <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusColors[o.status]}">${o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
                      <span class="font-semibold text-sm">$${o.total}</span>
                    </div>
                  </div>
                  <div class="flex gap-2">
                    <button class="text-sm text-brand-500 font-medium hover:text-brand-600">View Details</button>
                    ${o.status==='delivered'?'<button class="text-sm text-gray-500 font-medium hover:text-gray-700 ml-4">Track Package</button>':''}
                  </div>

              `).join('')}

          <!-- Wishlist preview -->
          ${state.wishlist.length > 0 ? `

                return `
                  <div class="product-card group cursor-pointer" onclick="navigate('product','${p.slug}')">
                    <div class="relative aspect-square rounded-xl overflow-hidden bg-surface-50 mb-2">

                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
        </div>
      </div>
    </div>
  `;
}

// =====================================================
// ANIMATIONS (GSAP + ScrollTrigger)
// =====================================================
function initPageAnimations() {
  // Hero entrance
  const heroWords = document.querySelectorAll('.gsap-hero-word');
  if (heroWords.length) {
    gsap.fromTo(heroWords, { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, stagger: 0.12, ease: 'power3.out', delay: 0.2 });
    // Parallax on hero image
    const heroImg = document.querySelector('#heroSection img');
    if (heroImg) {
      gsap.to(heroImg, { y: 80, ease: 'none', scrollTrigger: { trigger: '#heroSection', start: 'top top', end: 'bottom top', scrub: true } });
    }
  }

  // Scroll-triggered staggers
  const staggers = document.querySelectorAll('.gsap-stagger');
  staggers.forEach(el => {
    gsap.to(el, {
      y: 0, opacity: 1, duration: 0.6, ease: 'power2.out',
      scrollTrigger: { trigger: el, start: 'top 88%', once: true }
    });
  });

  // Swiper init
  initSwipers();
}

function initSwipers() {
  // Featured products swiper
  const featEl = document.querySelector('.featuredSwiper');
  if (featEl && !featEl.swiper) {
    new Swiper('.featuredSwiper', {
      slidesPerView: 1.2,
      spaceBetween: 16,
      grabCursor: true,
      breakpoints: {
        640: { slidesPerView: 2.2, spaceBetween: 20 },
        768: { slidesPerView: 3, spaceBetween: 24 },
        1024: { slidesPerView: 4, spaceBetween: 24 }
      },
      pagination: { el: '.featuredSwiper .swiper-pagination', clickable: true },
    });
  }

  // Related products swiper
  const relEl = document.querySelector('.relatedSwiper');
  if (relEl && !relEl.swiper) {
    new Swiper('.relatedSwiper', {
      slidesPerView: 1.3, spaceBetween: 16, grabCursor: true,
      breakpoints: { 640: { slidesPerView: 2.2, spaceBetween: 20 }, 1024: { slidesPerView: 3, spaceBetween: 24 } },
      pagination: { el: '.relatedSwiper .swiper-pagination', clickable: true },
    });
  }
}

// =====================================================
// WINDOW EVENTS
// =====================================================
window.addEventListener('resize', () => {
  // Destroy swipers on mobile if needed, handled by Swiper internally
});

// Back/forward browser navigation
window.addEventListener('popstate', () => {
  // Simple hash-based fallback — SPA nav handles most cases
});

// Keyboard: ESC closes overlays
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('cartPanel').classList.contains('open')) toggleCart(false);
    if (document.getElementById('searchBox').classList.contains('open')) toggleSearch(false);
    if (document.getElementById('authOverlay').classList.contains('open')) toggleAuth(false);
    if (document.getElementById('filterSheet').classList.contains('open')) toggleFilterSheet(false);
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    toggleSearch(true);
  }
});

// =====================================================
// INIT
// =====================================================
document.addEventListener('DOMContentLoaded', () => {
  // Register GSAP plugin
  gsap.registerPlugin(ScrollTrigger);

  // Render the initial page
  renderHeader();
  renderPage();
  renderBottomNav();

  // Animate homepage on load
  setTimeout(() => initPageAnimations(), 100);
});
</script>

</html>
